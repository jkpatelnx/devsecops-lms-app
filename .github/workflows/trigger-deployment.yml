
name: "CD / Trigger Deployment"

on:
  push:
    branches: [ main ]
    paths-ignore:              
      - 'README.md'
      - 'SECURITY.md'
      - 'CONTRIBUTING.md'
      - 'NOTICE'
      - 'LICENSE'
      - 'COPYING.txt'        
      - 'TRADEMARK.txt'   

jobs:
  trigger:
    name: "Trigger devsecops-lms-deployment cd/cd pipeline"
    runs-on: ubuntu-latest

    steps:
      - name: "Call GitHub API to trigger deployment pipeline"
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.DEPLOY_TRIGGER_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/json" \
          https://api.github.com/repos/jkpatelnx/devsecops-lms-deployment/dispatches \
          -d '{"event_type": "lms-app-updated"}'
